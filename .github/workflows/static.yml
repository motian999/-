<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 800, H = 500;
const GROUND_Y = 440;
const MAP_WIDTH = 5000;

function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x - camera.x), Math.floor(y), w, h);
}

// 景点数据
const spots = [
  {id:1, name:"故宫", x:350, w:280,
   img:"https://images.unsplash.com/photo-1508804185872-d7badad00f7d?w=600&q=80",
   desc:"故宫又称紫禁城，位于北京中轴线中心，是明清两代皇家宫殿。始建于1406年，占地72万平方米，有宫殿七十多座，房屋九千余间。世界现存规模最大、保存最完整的木质结构古建筑群，1987年列为世界文化遗产。"},
  {id:2, name:"天坛", x:800, w:240,
   img:"https://images.unsplash.com/photo-1599571234909-29ed5d1321d6?w=600&q=80",
   desc:"天坛位于北京南部，是明清皇帝祭天祈谷的场所，始建于1420年。主要建筑包括圜丘坛、祈年殿和皇穹宇。祈年殿高38米，三重檐圆形建筑。体现'天圆地方'宇宙观，1998年列为世界文化遗产。"},
  {id:3, name:"长城", x:1280, w:300,
   img:"https://images.unsplash.com/photo-1508804057556-31ec43d3c3f3?w=600&q=80",
   desc:"万里长城是中国古代军事防御工程，北京段八达岭和慕田峪最著名。始建于春秋战国，经多朝修缮，总长超2万公里。八达岭海拔1015米，是明长城精华段，1987年列为世界文化遗产。"},
  {id:4, name:"颐和园", x:1750, w:280,
   img:"https://images.unsplash.com/photo-1584711445678-de1e4b1b2e98?w=600&q=80",
   desc:"颐和园位于北京西北郊，是中国现存最大皇家园林，占地290公顷。以昆明湖和万寿山为基础，建筑以佛香阁为中心。长廊、石舫、十七孔桥等景观闻名，1998年列为世界文化遗产。"},
  {id:5, name:"鸟巢水立方", x:2200, w:280,
   img:"https://images.unsplash.com/photo-1573455494060-c5595004fb6c?w=600&q=80",
   desc:"国家体育场（鸟巢）和国家游泳中心（水立方）位于奥林匹克公园，是2008年奥运主场馆。鸟巢可容纳9.1万观众。水立方以独特ETFE膜结构气泡造型闻名。"},
  {id:6, name:"圆明园", x:2650, w:260,
   img:"https://images.unsplash.com/photo-1599161686883-92c6a7a08a98?w=600&q=80",
   desc:"圆明园位于北京西北郊，是清代大型皇家园林，由圆明园、长春园和绮春园组成，被誉为'万园之园'。1860年遭英法联军焚毁，现仅存遗址，是爱国主义教育重要基地。"},
  {id:7, name:"北海公园", x:3100, w:260,
   img:"https://images.unsplash.com/photo-1567604160575-5c3c9a48a6e1?w=600&q=80",
   desc:"北海公园位于北京中心，是中国现存最古老完整的皇家园林之一，始建于辽代，近千年历史。以琼华岛和白塔最著名，'让我们荡起双桨'描写的就是北海景象。"},
  {id:8, name:"雍和宫", x:3520, w:260,
   img:"https://images.unsplash.com/photo-1609766856923-7e0a7a3b2d4f?w=600&q=80",
   desc:"雍和宫位于东城区，是北京最大藏传佛教寺院，始建于1694年。原为雍正府邸，后改为喇嘛庙。万福阁内有18米高弥勒大佛，由一整根白檀木雕刻而成。"},
  {id:9, name:"景山公园", x:3950, w:260,
   img:"https://images.unsplash.com/photo-1584711445678-de1e4b1b2e98?w=600&q=80",
   desc:"景山公园位于故宫北面，是北京城最高点。山顶五座山峰各有亭子，万春亭是观看故宫全景最佳位置。从亭中俯瞰紫禁城金黄琉璃瓦尽收眼底。"},
  {id:10,name:"国子监", x:4350, w:260,
   img:"https://images.unsplash.com/photo-1583225429666-b9ab6fda6a12?w=600&q=80",
   desc:"国子监位于东城区，是元明清三代最高学府和教育管理机构，始建于1306年。辟雍大殿是核心建筑，方形重檐攒尖顶，四周环水，象征'辟雍'古制。"}
];

// 猫角色 - 脚底在 GROUND_Y
const CAT_H = 36; // 猫实际绘制高度
const player = {x: 60, y: GROUND_Y - CAT_H, w: 24, h: CAT_H, dir: 1, frame: 0, walkTimer: 0, speed: 3, moving: false};
const camera = {x: 0};
let collected = new Set();
let keys = {};
let nearSpot = null;
let gameOver = false;
let petals = [];

for(let i = 0; i < 80; i++) {
  petals.push({
    x: Math.random() * MAP_WIDTH,
    y: Math.random() * GROUND_Y,
    vx: -0.3 - Math.random() * 0.5,
    vy: 0.3 + Math.random() * 0.5,
    size: 2 + Math.random() * 3,
    color: Math.random() > 0.5 ? '#ffb7d5' : '#ffd1e3'
  });
}

// ========== 天空 ==========
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#ffc8dd');
  g.addColorStop(0.3, '#ffafcc');
  g.addColorStop(0.6, '#ffd6e8');
  g.addColorStop(1, '#e8f5e1');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, GROUND_Y);
}

// ========== 云朵 ==========
function drawClouds() {
  const data = [{x:80,y:30,s:1.4},{x:350,y:15,s:1.6},{x:600,y:40,s:1.1},{x:900,y:20,s:1.5},{x:1200,y:35,s:1.3},{x:1500,y:18,s:1.6},{x:1800,y:30,s:1.2},{x:2100,y:25,s:1.5},{x:2400,y:35,s:1},{x:2700,y:15,s:1.4},{x:3000,y:30,s:1.7},{x:3300,y:22,s:1.3},{x:3600,y:40,s:1.5},{x:3900,y:18,s:1.2},{x:4200,y:32,s:1.4}];
  data.forEach(c => {
    const cx = c.x - camera.x * 0.2;
    const wx = ((cx % 1000) + 1000) % 1000 - 100;
    const s = c.s;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(Math.floor(wx), c.y, Math.floor(55*s), Math.floor(16*s));
    ctx.fillRect(Math.floor(wx+12*s), c.y-12*s, Math.floor(32*s), Math.floor(14*s));
    ctx.fillRect(Math.floor(wx+6*s), c.y-18*s, Math.floor(22*s), Math.floor(8*s));
    ctx.fillRect(Math.floor(wx+22*s), c.y-14*s, Math.floor(28*s), Math.floor(16*s));
  });
}

// ========== 远景山 ==========
function drawMountains() {
  ctx.fillStyle = '#e8c8d8';
  for(let i = 0; i < 15; i++) {
    const mx = i * 350 - (camera.x * 0.12) % 350;
    ctx.beginPath();
    ctx.moveTo(mx, GROUND_Y);
    ctx.lineTo(mx + 80, GROUND_Y - 55);
    ctx.lineTo(mx + 175, GROUND_Y - 28);
    ctx.lineTo(mx + 260, GROUND_Y - 65);
    ctx.lineTo(mx + 350, GROUND_Y);
    ctx.fill();
  }
  ctx.fillStyle = '#f0d0e0';
  for(let i = 0; i < 18; i++) {
    const mx = i * 280 - (camera.x * 0.25) % 280;
    ctx.beginPath();
    ctx.moveTo(mx, GROUND_Y);
    ctx.lineTo(mx + 60, GROUND_Y - 32);
    ctx.lineTo(mx + 140, GROUND_Y - 16);
    ctx.lineTo(mx + 210, GROUND_Y - 38);
    ctx.lineTo(mx + 280, GROUND_Y);
    ctx.fill();
  }
}

// ========== 地面 ==========
function drawGround() {
  const gg = ctx.createLinearGradient(0, GROUND_Y, 0, GROUND_Y + 12);
  gg.addColorStop(0, '#7dc86a');
  gg.addColorStop(1, '#5aaa48');
  ctx.fillStyle = gg;
  ctx.fillRect(0, GROUND_Y, W, 12);
  ctx.fillStyle = '#a08050';
  ctx.fillRect(0, GROUND_Y + 12, W, 48);
  for(let i = 0; i < 60; i++) {
    const gx = ((i * 16 - camera.x % 16) % W + W) % W;
    ctx.fillStyle = '#8a6a3a';
    ctx.fillRect(Math.floor(gx), GROUND_Y + 20, 4, 4);
    ctx.fillStyle = '#7a5a2a';
    ctx.fillRect(Math.floor(gx + 8), GROUND_Y + 38, 3, 3);
  }
  // 花草
  const colors = ['#ff69b4','#ffdd57','#ff8c42','#b388ff','#64ffda'];
  for(let i = 0; i < 100; i++) {
    const gx = ((i * 10 - camera.x % 10) % W + W) % W;
    ctx.fillStyle = '#5a9a3a';
    ctx.fillRect(Math.floor(gx), GROUND_Y - 4, 2, 5);
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(Math.floor(gx), GROUND_Y - 6, 3, 3);
  }
}

// ========== 樱花树（大型）==========
function drawSakuraTree(sx, sy, size) {
  const x = sx - camera.x;
  if(x < -80 || x > W + 80) return;
  const s = size || 1;
  // 树干
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(Math.floor(sx - camera.x - 5*s), Math.floor(sy - 50*s), Math.floor(10*s), Math.floor(50*s));
  ctx.fillStyle = '#A0714F';
  ctx.fillRect(Math.floor(sx - camera.x - 2*s), Math.floor(sy - 48*s), Math.floor(4*s), Math.floor(46*s));
  // 分枝
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(Math.floor(sx - camera.x - 20*s), Math.floor(sy - 52*s), Math.floor(18*s), Math.floor(5*s));
  ctx.fillRect(Math.floor(sx - camera.x + 8*s), Math.floor(sy - 56*s), Math.floor(18*s), Math.floor(5*s));
  // 樱花团 - 大型
  const bc = ['#ffb7d5','#ff99c8','#ffc8dd','#ffd6e8','#ff8fab'];
  ctx.fillStyle = '#ffb7d5';
  ctx.fillRect(Math.floor(sx - camera.x - 30*s), Math.floor(sy - 90*s), Math.floor(60*s), Math.floor(40*s));
  ctx.fillStyle = '#ff99c8';
  ctx.fillRect(Math.floor(sx - camera.x - 24*s), Math.floor(sy - 105*s), Math.floor(48*s), Math.floor(20*s));
  ctx.fillStyle = '#ffc8dd';
  ctx.fillRect(Math.floor(sx - camera.x - 18*s), Math.floor(sy - 115*s), Math.floor(36*s), Math.floor(14*s));
  ctx.fillStyle = '#ff8fab';
  ctx.fillRect(Math.floor(sx - camera.x - 32*s), Math.floor(sy - 78*s), Math.floor(26*s), Math.floor(22*s));
  ctx.fillStyle = '#ffb7d5';
  ctx.fillRect(Math.floor(sx - camera.x + 12*s), Math.floor(sy - 82*s), Math.floor(24*s), Math.floor(26*s));
  // 高光
  ctx.fillStyle = '#ffd6e8';
  for(let i = 0; i < 15; i++) {
    const bx = sx - camera.x + (Math.sin(i*2.3)*28*s);
    const by = sy - 60*s - Math.abs(Math.cos(i*1.7))*40*s;
    ctx.fillRect(Math.floor(bx), Math.floor(by), Math.floor(4*s), Math.floor(4*s));
  }
}

// 小花丛
function drawFlowerPatch(sx, sy) {
  const x = sx - camera.x;
  if(x < -30 || x > W + 30) return;
  const colors = ['#ff69b4','#ffdd57','#ff8c42','#b388ff','#64ffda','#ffb7d5'];
  for(let i = 0; i < 7; i++) {
    const fx = sx - 14 + i * 5;
    ctx.fillStyle = '#5a9a3a';
    ctx.fillRect(Math.floor(fx - camera.x), Math.floor(sy - 8), 2, 8);
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(Math.floor(fx - camera.x - 1), Math.floor(sy - 10 - (i%3)*2), 4, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(Math.floor(fx - camera.x), Math.floor(sy - 9 - (i%3)*2), 2, 2);
  }
}

// ========== 景点像素建筑（超大占满屏幕版）==========
function drawSpotBuilding(spot) {
  const sx = spot.x;
  const x = sx - camera.x;
  if(x < -350 || x > W + 350) return;
  const gy = GROUND_Y;
  const S = 3; // 基础像素单位放大

  switch(spot.id) {
    case 1: { // ====== 故宫 - 超大太和殿 ======
      // 大台基（三层汉白玉）
      ctx.fillStyle = '#f5e6c8';
      ctx.fillRect(Math.floor(x-40), gy-50, 360, 50);
      ctx.fillStyle = '#e8d5a8';
      ctx.fillRect(Math.floor(x-25), gy-42, 330, 35);
      ctx.fillStyle = '#f5e6c8';
      ctx.fillRect(Math.floor(x-10), gy-34, 300, 25);
      // 栏杆
      ctx.fillStyle = '#fff';
      for(let i=0;i<18;i++) ctx.fillRect(Math.floor(x-35+i*20), gy-55, 5, 10);
      // 大红墙
      ctx.fillStyle = '#e63946';
      ctx.fillRect(Math.floor(x+10), gy-250, 260, 200);
      ctx.fillStyle = '#ef5350';
      ctx.fillRect(Math.floor(x+18), gy-242, 244, 185);
      // 大柱子
      ctx.fillStyle = '#b71c1c';
      for(let i=0;i<10;i++) ctx.fillRect(Math.floor(x+22+i*25), gy-250, 10, 200);
      // 大门
      ctx.fillStyle = '#7f0000';
      ctx.fillRect(Math.floor(x+100), gy-200, 80, 150);
      ctx.fillStyle = '#5c0000';
      ctx.fillRect(Math.floor(x+108), gy-192, 64, 138);
      // 门钉 7x7
      ctx.fillStyle = '#ffd700';
      for(let r=0;r<7;r++) for(let c=0;c<6;c++) ctx.fillRect(Math.floor(x+112+c*10), gy-185+r*16, 6, 6);
      // 金色屋檐 - 三层
      ctx.fillStyle = '#ffb300';
      ctx.fillRect(Math.floor(x-20), gy-275, 320, 25);
      ctx.fillStyle = '#ffd54f';
      ctx.fillRect(Math.floor(x-5), gy-295, 290, 22);
      ctx.fillStyle = '#ffb300';
      ctx.fillRect(Math.floor(x+20), gy-315, 240, 22);
      // 屋脊
      ctx.fillStyle = '#ff8f00';
      ctx.fillRect(Math.floor(x+50), gy-335, 180, 20);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(Math.floor(x+115), gy-360, 50, 25);
      // 飞檐翘角
      ctx.fillStyle = '#ffb300';
      ctx.fillRect(Math.floor(x-35), gy-268, 25, 8);
      ctx.fillRect(Math.floor(x+290), gy-268, 25, 8);
      ctx.fillStyle = '#ffd54f';
      ctx.fillRect(Math.floor(x-42), gy-275, 12, 6);
      ctx.fillRect(Math.floor(x+310), gy-275, 12, 6);
      // 匾额
      ctx.fillStyle = '#1a237e';
      ctx.fillRect(Math.floor(x+88), gy-235, 104, 28);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(Math.floor(x+98), gy-228, 84, 14);
      // 窗户
      ctx.fillStyle = '#7f0000';
      for(let i=0;i<3;i++) {
        ctx.fillRect(Math.floor(x+28+i*28), gy-180, 18, 35);
        ctx.fillRect(Math.floor(x+222+i*28), gy-180, 18, 35);
      }
      break;
    }

    case 2: { // ====== 天坛 - 超大祈年殿 ======
      // 三层圆台基座
      ctx.fillStyle = '#e0e0e0';
      ctx.fillRect(Math.floor(x+5), gy-30, 230, 30);
      ctx.fillStyle = '#eee';
      ctx.fillRect(Math.floor(x+20), gy-52, 200, 22);
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.floor(x+35), gy-70, 170, 18);
      // 栏杆
      ctx.fillStyle = '#ddd';
