}
.ai-picture-seting-item .setting-icon.ai-picture-setting-delay-use {
  background-image: var(--setting-icon-delay-use-url);
}
.ai-picture-seting-item .ai-picture-setting-text {
  white-space: nowrap;
}

@keyframes fade-out {
  0% {
    visibility: visible;
    opacity: 1;
  }
  100% {
    opacity: 0;
    visibility: hidden;
    display: none;
  }
